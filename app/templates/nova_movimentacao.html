<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Movimentação</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>
<body>
    <header class="topo">
        <h1>Nova Movimentação</h1>
        <p>Cadastre uma entrada ou saída do fluxo de caixa</p>
        
        <div class="topo-acoes">
            <a class="botao botao-topo" href="/dashboard">Voltar ao dashboard</a>
            <a class="botao botao-topo" href="/movimentacoes/historico">Ver histórico</a>

            {% if usuario_logado.is_admin %}
                <a class="botao botao-topo" href="/categorias">Categorias</a>
                <a class="botao botao-topo" href="/usuarios">Usuários</a>
            {% endif %}

            <a class="botao botao-topo" href="logout">Sair</a>
        </div>
    </header>

    <main class="container">
        <section class="card formulario-container">
            <form action="/movimentacoes/nova" method="post" class="form-grid">
                <div class="campo">
                    <label for="tipo">Tipo</label>
                    <select id="tipo" name="tipo" required>
                        <option value="">Selecione o tipo</option>
                        <option value="entrada">Entrada</option>
                        <option value="saida">Saída</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="descricao">Descrição</label>
                    <input type="text" id="descricao" name="descricao" required>
                </div>

                <div class="campo">
                    <label for="valor">Valor</label>
                    <input type="number" id="valor" name="valor" step="0.01" min="0.01" required>
                </div>

                <div class="campo">
                    <label for="data_movimentacao">Data da movimentação</label>
                    <input type="date" id="data_movimentacao" name="data_movimentacao" required>
                </div>

                <div class="campo">
                    <label for="categoria_id">Categoria</label>
                    <select id="categoria_id" name="categoria_id" required>
                        <option value="">Selecione a categoria</option>
                        {% for categoria in categorias %}
                            <option value="{{ categoria.id }}" data-tipo="{{ categoria.tipo }}">
                                {{ categoria.nome }} ({{ categoria.tipo }})
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="campo">
                    <label for="forma_pagamento">Forma de pagamento</label>
                    <input type="text" id="forma_pagamento" name="forma_pagamento">
                </div>

                <div class="campo campo-largo">
                    <label for="observacao">Observação</label>
                    <textarea id="observacao" name="observacao" rows="4"></textarea>
                </div>

                <div class="campo campo-largo">
                    <label>Usuário logado</label>
                    <input type="text" value="{{ usuario_logado.nome }}" disabled>
                </div>

                <div class="acoes-formulario campo-largo">
                    <button type="submit" class="botao botao-primario">Salvar movimentação</button>
                    <a href="/dashboard" class="botao botao-secundario">Cancelar</a>
                </div>
            </form>
        </section>
    </main>

    <script>
        const tipoSelect = document.getElementById("tipo");
        const categoriaSelect = document.getElementById("categoria_id");
        const opcoesCategoria = Array.from(categoriaSelect.options);

        function atualizarCategorias() {
            const tipoSelecionado = tipoSelect.value;
            categoriaSelect.value = "";

            opcoesCategoria.forEach((opcao, indice) => {
                if (indice === 0) {
                    opcao.hidden = false;
                    return;
                }

                const tipoCategoria = opcao.getAttribute("data-tipo");
                const deveMostrar = tipoSelecionado === "" || tipoCategoria === tipoSelecionado;
                opcao.hidden = !deveMostrar;
            });
        }

        tipoSelect.addEventListener("change", atualizarCategorias);
        atualizarCategorias();
    </script>
</body>
</html>
